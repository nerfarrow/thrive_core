services:
  api:
    build: ./api
    container_name: thrivebase_api
    restart: unless-stopped
    volumes:
      - ./data:/data
      - ./modules:/app/modules   # modules mounted live — no rebuild needed
    environment:
      - DB_FILE=/data/thrivebase.db
      - MODULES_DIR=/app/modules
      - COOKIE_SECURE=false   # http dev on :9500 — Secure cookies get dropped over http
      - SESSION_DAYS=30
    networks:
      - internal

  ui:
    build: ./ui
    container_name: thrivebase_ui
    restart: unless-stopped
    ports:
      - "9500:80"
    depends_on:
      - api
    networks:
      - internal

networks:
  internal:
    driver: bridge