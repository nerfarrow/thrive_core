services:
  api:
    build: ./api
    container_name: thrivecore_api
    restart: unless-stopped
    volumes:
      - ./data:/data
      - ./modules:/app/modules   # modules mounted live — no rebuild needed
    environment:
      - PYTHONUNBUFFERED=1     # flush print() immediately so [modules] logs aren't buffered
      - DB_FILE=/data/thrivecore.db
      - MODULES_DIR=/app/modules
      - COOKIE_SECURE=false   # http dev on :9500 — Secure cookies get dropped over http
      - SESSION_DAYS=30
      # vehicles/mpg vision: local LLM hosts for the fuel-log OCR (override per box)
      - LMSTUDIO_BASE=http://192.168.0.50:1234
      - OLLAMA_BASE=http://192.168.0.50:11434
    networks:
      - internal

  ui:
    build: ./ui
    container_name: thrivecore_ui
    restart: unless-stopped
    ports:
      - "9500:80"
    depends_on:
      - api
      - vault
    networks:
      - internal

  # vault module: self-hosted Vaultwarden (Bitwarden-compatible). Reached only
  # through nginx at /vault/ (not exposed directly). DOMAIN must match how you
  # actually reach the app, e.g. http://<nerfBase-ip>:9500/vault.
  vault:
    image: vaultwarden/server:latest
    container_name: thrivecore_vault
    restart: unless-stopped
    volumes:
      - ./data/vault:/data
    environment:
      - DOMAIN=https://test.nerfarrow.com/vault   # public URL via Cloudflare Tunnel
      - ROCKET_PORT=8222
      - WEB_VAULT_ENABLED=true
      - SIGNUPS_ALLOWED=true   # set false after you create your account
    networks:
      - internal

  # Cloudflare Tunnel — exposes the app at https://test.nerfarrow.com with a real
  # cert (no port-forwarding). HTTPS is REQUIRED for the vault (Web Crypto needs a
  # secure context). Create a tunnel in the Cloudflare Zero Trust dashboard, set a
  # public hostname → http://thrivecore_ui:80, and put the token in TUNNEL_TOKEN
  # (e.g. a .env file next to this compose). Remove this service to go LAN-only.
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: thrivecore_cloudflared
    restart: unless-stopped
    command: tunnel --no-autoupdate run --token ${TUNNEL_TOKEN:-}
    depends_on:
      - ui
    networks:
      - internal
    profiles: ["tunnel"]   # opt-in: docker compose --profile tunnel up -d

networks:
  internal:
    driver: bridge