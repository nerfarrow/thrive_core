services:
  api:
    build: ./api
    container_name: thrivebase_api
    restart: unless-stopped
    volumes:
      - ./data:/data
    environment:
      - DB_FILE=/data/thrivebase.db
      - COOKIE_SECURE=true
      - SESSION_DAYS=30
    networks:
      - internal

  ui:
    build: ./ui
    container_name: thrivebase_ui
    restart: unless-stopped
    ports:
      - "9500:80"
    depends_on:
      - api
    networks:
      - internal

networks:
  internal:
    driver: bridge