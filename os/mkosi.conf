# thriveOS image definition (mkosi). Assembles a minimal, bootable Debian trixie
# appliance with Docker + thrive's first-boot machinery (clones the repo, runs core/).
#
# NOTE: mkosi's config schema and CLI verbs shift between versions. Keys most likely
# to need adjusting for the installed mkosi are tagged `# VERIFY`.

[Distribution]
Distribution=debian
Release=trixie

[Output]
Format=disk            # VERIFY: produce a bootable disk image (older mkosi: "gpt_ext4")
ImageId=thriveos

[Content]
Bootable=yes
Bootloader=systemd-boot   # VERIFY: systemd-boot for UEFI; switch to grub for BIOS-only HW
RootPassword=thriveos     # DEV DEFAULT — CHANGE before any real deploy
Hostname=thriveos
# Preseed locale/keymap/timezone so systemd-firstboot has nothing to ask and the
# appliance boots UNATTENDED. Without these it stops at an interactive wizard.
Locale=en_US.UTF-8
Keymap=us
Timezone=America/Chicago
# Serial console (alongside the graphical tty0) so a headless host / `virsh console`
# gets the full boot log + a login shell — essential for debugging an appliance.
# `audit=0` disables the kernel audit subsystem and `loglevel=4` drops info-level
# kernel chatter (the docker veth/netdev churn): together they stop the console
# firehose that was burying the login prompt and making the box undebuggable.
# systemd service output (incl. thrive first-boot) still reaches the console.
KernelCommandLine=console=tty0 console=ttyS0,115200 loglevel=4 audit=0
Packages=
        linux-image-amd64
        systemd
        systemd-boot
        systemd-repart      # grow root to fill the disk on boot (mkosi installs it late
                            # for its own use, so list it here or our postinst enable no-ops)
        systemd-resolved
        udev
        dbus
        login               # the /usr/bin/login binary itself — Debian trixie split it out of
                            # util-linux into its own package; only `login.defs` (config) gets
                            # pulled into a --no-install-recommends minimal image, so WITHOUT this
                            # /bin/login is absent and every getty respawns ("can't exec /bin/login")
                            # → the console-login "blink" loop, on hardware and in VMs alike
        ca-certificates
        sudo
        openssh-server
        git
        curl
        less
        vim-tiny
        docker.io           # the dockerd DAEMON only (Debian trixie split the client out)
        docker-cli          # the `docker` CLI client — docker.io only *Recommends* it, and
                            # mkosi installs --no-install-recommends, so it MUST be listed or
                            # every `docker` command fails ("/usr/bin/docker: not found")
        docker-compose      # Debian trixie ships compose v2 (2.26.x) as a cli-plugin under this name

[Validation]
SecureBoot=no

[Runtime]
RAM=2G
