# Grow the root partition (and its ext4 filesystem) to fill the whole disk on
# boot. The built image is sized to its content (~1.6G), which leaves no room for
# Docker images + the thrive build. systemd-repart grows root online early in boot
# — so the appliance uses the entire device regardless of how big the disk is.
[Partition]
Type=root
GrowFileSystem=yes
