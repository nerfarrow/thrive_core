# thriveOS / Raspberry Pi 5 — arm64 ROOTFS definition (mkosi).
#
# This config produces a plain DIRECTORY rootfs, not a disk: the Pi cannot
# boot mkosi's GPT/UEFI disk output (its firmware wants an MBR table with a
# FAT32 first partition holding the GPU firmware + kernel, and there's no UEFI
# without third-party shims). build.sh turns this rootfs into the bootable
# sprout-pi.raw: MBR, FAT32 firmware partition, ext4 root.
#
# Shares the amd64 image's overlay (../mkosi.extra: thrive.service, bootstrap,
# networkd DHCP, branding) plus the pi-specific one here (fstab, first-boot
# grow). Same VERIFY convention as ../mkosi.conf for version-sensitive keys.

[Distribution]
Distribution=debian
Release=trixie
Architecture=arm64     # cross-built under qemu-user binfmt; build.sh sets that up
Repositories=main,non-free-firmware   # VERIFY key name; non-free-firmware = Pi wifi blobs

[Output]
Format=directory       # VERIFY: rootfs tree only — build.sh assembles the disk
ImageId=sprout-pi
OutputDirectory=.      # VERIFY: emit ./sprout-pi (build.sh expects it here)

[Content]
Bootable=no            # no UEFI/systemd-boot on Pi — firmware loads the kernel directly
RootPassword=sprout    # DEV DEFAULT — CHANGE before any real deploy
Hostname=sprout
# Preseed locale/keymap/timezone so systemd-firstboot has nothing to ask and the
# appliance boots UNATTENDED (same rationale as the amd64 image).
Locale=en_US.UTF-8
Keymap=us
Timezone=America/Chicago
ExtraTrees=../mkosi.extra   # VERIFY: shared overlay *in addition to* ./mkosi.extra
Packages=
        linux-image-rpi-2712 # Raspberry Pi DOWNSTREAM kernel for the Pi 5 (BCM2712).
                            # REQUIRED over mainline linux-image-arm64: the Pi 5 puts USB +
                            # Ethernet behind the RP1 I/O chip, whose drivers are NOT in
                            # mainline 6.12 (what trixie ships) — only in this RPi kernel, so a
                            # mainline image boots the CPU but has no network = dead appliance.
                            # Pulled from archive.raspberrypi.com (mkosi.sandbox + the pin).
        raspberrypi-archive-keyring  # the running Pi trusts the RPi repo for future kernel updates
        raspi-firmware      # RPi's (pinned): Pi boot firmware blobs + the bcm2712 dtbs;
                            # build.sh copies what the FAT32 firmware partition needs
        initramfs-tools     # update-initramfs — the kernel postinst builds the initrd
                            # we copy to the firmware partition
        firmware-brcm80211  # onboard wifi/bt blobs (non-free-firmware) — wired is the
                            # appliance default but the radio should at least function
        systemd
        systemd-sysv        # provides /sbin/init -> systemd. The amd64 image boots via
                            # systemd-boot (which passes init=), but the Pi defaults to
                            # /sbin/init — without this the initramfs can't hand off
                            # ("run-init: /sbin/init: No such file or directory").
        systemd-resolved
        udev
        dbus
        login               # /usr/bin/login itself — same trixie packaging split as amd64:
                            # without it every getty respawns in a blink loop
        passwd
        ca-certificates
        sudo
        openssh-server
        git
        curl
        less
        vim-tiny
        docker.io           # daemon only — trixie splits the client out (same as amd64)
        docker-cli
        docker-compose
        dosfstools          # fsck.vfat for /boot/firmware
        e2fsprogs           # resize2fs for the first-boot grow
        cloud-guest-utils   # growpart — MBR-safe partition grow (systemd-repart is
                            # GPT-only, so the amd64 image's repart trick can't work here)
        plymouth            # boot splash — shows the Thrive logo (themes/thrive, shipped via
                            # ../mkosi.extra) instead of kernel text in the `user` build. Only
                            # ACTIVE when the cmdline carries `quiet splash` (build.sh PROFILE=user);
                            # the `dev` build keeps the verbose console, so plymouth stays dormant.
        # NOTE: deliberately NO desktop on the Pi image — it's a headless appliance
        # (ssh + thrive on :9500). XFCE+Firefox would eat a third of a 4GB Pi's RAM.

[Validation]
SecureBoot=no
