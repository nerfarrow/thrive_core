server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # keep any nginx-generated redirect relative — never drop the :9500 host:port
    absolute_redirect off;

    location /api/ {
        proxy_pass http://thrive_api:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Cookie $http_cookie;
    }

    # exact /vault is the SPA client page. This MUST come before the /vault/
    # proxy: otherwise nginx auto-301s /vault → /vault/ (into Vaultwarden).
    location = /vault {
        try_files /index.html =404;
    }

    # vault module (OPTIONAL): proxied to the Vaultwarden container, which exists
    # only when the vault module is installed (modules/vault/compose.yml brings up
    # thrive_vault). A runtime resolver + variable upstream means nginx still STARTS
    # when the container is absent — /vault/ just 502s until vault is installed,
    # instead of nginx refusing to boot ("host not found in upstream thrive_vault").
    # 127.0.0.11 is Docker's embedded DNS on the user-defined `internal` network.
    location /vault/ {
        resolver 127.0.0.11 valid=10s ipv6=off;
        set $vault_upstream thrive_vault;
        proxy_pass http://$vault_upstream:8222$request_uri;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Vite build assets are content-hashed (index-<hash>.js) → safe to cache forever.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location / {
        try_files $uri $uri/ /index.html;
        # index.html (and the SPA fallback) must always be revalidated, otherwise a
        # cached HTML keeps pointing at an old bundle after a deploy.
        add_header Cache-Control "no-cache";
    }
}