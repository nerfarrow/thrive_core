server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # keep any nginx-generated redirect relative — never drop the :9500 host:port
    absolute_redirect off;

    location /api/ {
        proxy_pass http://thrive_api:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Cookie $http_cookie;
    }

    # exact /vault is the SPA client page. This MUST come before the /vault/
    # proxy: otherwise nginx auto-301s /vault → /vault/ (into Vaultwarden).
    location = /vault {
        try_files /index.html =404;
    }

    # vault module: Vaultwarden web vault + API behind /vault/.
    location /vault/ {
        proxy_pass http://thrive_vault:8222/vault/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}