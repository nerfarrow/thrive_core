# Run from thrive/core/. The pluggable modules live one level up at thrive/modules
# and are bind-mounted in live. Explicit project name keeps container/network/image
# names stable (thrive_*) regardless of the directory this is launched from.
name: thrive

services:
  api:
    build: ./api
    container_name: thrive_api
    restart: unless-stopped
    volumes:
      - ./data:/data
      - ../modules:/app/modules   # modules live at thrive/modules — mounted live, no rebuild
    environment:
      - PYTHONUNBUFFERED=1     # flush print() immediately so [modules] logs aren't buffered
      - DB_FILE=/data/thrive.db
      - MODULES_DIR=/app/modules
      - COOKIE_SECURE=false   # http dev on :9500 — Secure cookies get dropped over http
      - SESSION_DAYS=30
      # lmstudio module: default local LM Studio host for vision OCR (override per
      # box; also settable at runtime in Settings → LM Studio)
      - LMSTUDIO_BASE=http://192.168.0.50:1234
      # budget/plaid: keys from dashboard.plaid.com (Developers → Keys). Put real
      # values in a .env next to this compose. URL: sandbox or production.plaid.com
      - PLAID_CLIENT_ID=${PLAID_CLIENT_ID:-}
      - PLAID_SECRET=${PLAID_SECRET:-}
      - PLAID_URL=${PLAID_URL:-https://production.plaid.com}
    networks:
      - internal

  ui:
    # context is core/ (this dir) so the build can include the shared
    # blackhole-lensing/ library (imported by the UI via a Vite alias).
    build:
      context: .
      dockerfile: ui/Dockerfile
    container_name: thrive_ui
    restart: unless-stopped
    ports:
      - "9500:80"
    depends_on:
      - api
      - vault
    networks:
      - internal

  # vault module: self-hosted Vaultwarden (Bitwarden-compatible). Reached only
  # through nginx at /vault/ (not exposed directly). DOMAIN must match how you
  # actually reach the app, e.g. http://<nerfBase-ip>:9500/vault.
  vault:
    image: vaultwarden/server:latest
    container_name: thrive_vault
    restart: unless-stopped
    volumes:
      - ./data/vault:/data
    environment:
      # public URL via Cloudflare Tunnel. HTTPS is REQUIRED for the vault (Web
      # Crypto needs a secure context). nerfBase already runs cloudflared, so no
      # connector here — just add a public hostname on the existing tunnel:
      #   thrive.nerfarrow.com → http://localhost:9500  (the host-published UI port)
      # Must match the public URL you serve the app at.
      - DOMAIN=https://thrive.nerfarrow.com/vault
      - ROCKET_PORT=8222
      - WEB_VAULT_ENABLED=true
      - SIGNUPS_ALLOWED=false  # locked down after accounts created; flip to true briefly to add people
    networks:
      - internal

networks:
  internal:
    driver: bridge