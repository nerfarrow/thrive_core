# Run from thrive/core/. The pluggable modules live one level up at thrive/modules
# and are bind-mounted in live. Explicit project name keeps container/network/image
# names stable (thrive_*) regardless of the directory this is launched from.
name: thrive

services:
  api:
    # context is the REPO ROOT so the build installs each module's backend deps
    # (modules/<name>/requirements.txt) alongside core's. Module code is still
    # bind-mounted live below — only deps are baked at build.
    build:
      context: ..
      dockerfile: core/api/Dockerfile
    container_name: thrive_api
    restart: unless-stopped
    volumes:
      - ./data:/data
      - ../modules:/app/modules   # modules live at thrive/modules — mounted live, no rebuild
    environment:
      - PYTHONUNBUFFERED=1     # flush print() immediately so [modules] logs aren't buffered
      - DB_FILE=/data/thrive.db
      - MODULES_DIR=/app/modules
      - COOKIE_SECURE=false   # http dev on :9500 — Secure cookies get dropped over http
      - SESSION_DAYS=30
      # lmstudio module: default local LM Studio host for vision OCR (override per
      # box; also settable at runtime in Settings → LM Studio)
      - LMSTUDIO_BASE=http://192.168.0.50:1234
      # budget/plaid: keys from dashboard.plaid.com (Developers → Keys). Put real
      # values in a .env next to this compose. URL: sandbox or production.plaid.com
      - PLAID_CLIENT_ID=${PLAID_CLIENT_ID:-}
      - PLAID_SECRET=${PLAID_SECRET:-}
      - PLAID_URL=${PLAID_URL:-https://production.plaid.com}
    networks:
      - internal

  ui:
    # context is the REPO ROOT (one level up) so the UI build can see both the
    # shared renderer libs under core/ AND modules/<name>/ui — the latter is
    # discovered at build time by a Vite glob (build-time module pages).
    build:
      context: ..
      dockerfile: core/ui/Dockerfile
    container_name: thrive_ui
    restart: unless-stopped
    ports:
      - "9500:80"
    # NOTE: no `depends_on: vault` — vault is an OPT-IN module that ships its own
    # container (modules/vault/compose.yml), so core must start without it. nginx
    # tolerates a missing thrive_vault (runtime resolver — see core/ui/nginx.conf).
    depends_on:
      - api
    networks:
      - internal

# vault's Vaultwarden container used to live here; it moved to
# modules/vault/compose.yml so it runs ONLY when the vault module is installed.
# Bring up the full stack (core + every present module's containers) with
# core/thrive-compose.sh, which merges each modules/*/compose.yml.
networks:
  internal:
    driver: bridge