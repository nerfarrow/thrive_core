server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    location /api/ {
        proxy_pass http://thrivecore_api:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Cookie $http_cookie;
    }

    # vault module: Vaultwarden behind /vault/. The exact /vault path is the SPA
    # client page (falls through to /); only /vault/* proxies to Vaultwarden.
    location /vault/ {
        proxy_pass http://thrivecore_vault:8222/vault/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect http:// https://;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}