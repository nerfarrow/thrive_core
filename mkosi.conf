# thriveOS image definition (mkosi). Assembles a minimal, bootable Debian trixie
# appliance with Docker + thrive_base's first-boot machinery.
#
# NOTE: mkosi's config schema and CLI verbs shift between versions. Keys most likely
# to need adjusting for the installed mkosi are tagged `# VERIFY`.

[Distribution]
Distribution=debian
Release=trixie

[Output]
Format=disk            # VERIFY: produce a bootable disk image (older mkosi: "gpt_ext4")
ImageId=thriveos

[Content]
Bootable=yes
Bootloader=systemd-boot   # VERIFY: systemd-boot for UEFI; switch to grub for BIOS-only HW
Autologin=yes             # console autologin — DEV CONVENIENCE, remove for production
RootPassword=thriveos     # DEV DEFAULT — CHANGE before any real deploy
Hostname=thriveos
Packages=
        linux-image-amd64
        systemd
        systemd-boot
        systemd-resolved
        udev
        dbus
        ca-certificates
        sudo
        openssh-server
        network-manager
        git
        curl
        less
        vim-tiny
        docker.io
        docker-compose      # Debian trixie ships compose v2 (2.26.x) under this name; provides the `docker compose` plugin

[Validation]
SecureBoot=no

[Runtime]
RAM=2G
